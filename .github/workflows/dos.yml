name: DOS CI

on:
  push:
    branches: '*'
    tags: 'v*'
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      DOS_SDL_BRANCH: dos_vclock
    steps:
    - name: Install Dependencies
      run: sudo apt-get install wget bzip2 zstd upx-ucl zip pipx libfl2 && pipx install cloudsmith-cli
    - name: Initialize environment variables
      run: |
        echo "DJGPP_PREFIX=/opt/i386-pc-msdosdjgpp-toolchain" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=/opt/i386-pc-msdosdjgpp-toolchain/lib/pkgconfig" >> $GITHUB_ENV
    - name: Cache DJGPP Toolchain
      uses: actions/cache@v3
      with:
        path: ${{ env.DJGPP_PREFIX }}
        key: djgpp-i386-linux64-gcc1420
        restore-keys: |
          djgpp-linux64
    - name: Download and Setup DJGPP Toolchain
      run: |
        mkdir -p $DJGPP_PREFIX
        if [ ! -f "$DJGPP_PREFIX/bin/i386-pc-msdosdjgpp-gcc" ]; then
          cd /tmp
          wget -q -O djgpp-i386-linux64-gcc1420.tar.zst \
            https://media.githubusercontent.com/media/sdlpal/tools/refs/heads/master/djgpp-i386-linux64-gcc1420.tar.zst || \
            { echo "Download failed"; exit 1; }
          tar xf djgpp-i386-linux64-gcc1420.tar.zst || { echo "Extract failed"; exit 1; }
          mv i386-pc-msdosdjgpp-toolchain/* $DJGPP_PREFIX/
          rm -rf i386-pc-msdosdjgpp-toolchain djgpp-i386-linux64-gcc1420.tar.zst
          sudo mkdir -p /opt && sudo ln -sf $DJGPP_PREFIX /opt/i386-pc-msdosdjgpp-toolchain
        fi
        source $DJGPP_PREFIX/bin/i386-pc-msdosdjgpp-setenv
        which i386-pc-msdosdjgpp-gcc > /dev/null || { echo "GCC not found"; exit 1; }
        env >> $GITHUB_ENV
        echo "$PATH" >> $GITHUB_PATH
    - uses: actions/checkout@v4
    - name: submodules
      run: |
        sed -i 's#\.\./#https://github.com/sdlpal/#g' .gitmodules
        git submodule update --init
        cd 3rd/SDL
        git fetch origin $DOS_SDL_BRANCH
        git checkout $DOS_SDL_BRANCH
    - name: Setup SDL2-config for DJGPP
      run: |
        echo "SHELL=$SHELL"
        echo "PATH=$PATH"
        cd 3rd/SDL
        ./configure --host=i386-pc-msdosdjgpp CC=i386-pc-msdosdjgpp-gcc CXX=i386-pc-msdosdjgpp-g++ CXXCPP=i386-pc-msdosdjgpp-cpp --prefix=$DJGPP_PREFIX --disable-shared --enable-static CFLAGS="-O2 -ggdb" CXXFLAGS="-O2 -ggdb" || { cat config.log; exit 1; }
        make
        make install
    - name: Build DOS version
      run: cd dos && make
    - name: Strip and Compress
      run: |
        cd dos
        #i386-pc-msdosdjgpp-strip -s sdlpal.exe
        upx --best --lzma sdlpal.exe
        mkdir ../deploy/
        mv sdlpal.exe ../deploy/
        cd ..
    - name: deploy
      if: github.repository == 'sdlpal/sdlpal' && github.event_name != 'pull_request'
      env:
        CLOUDSMITH_API_KEY: ${{secrets.CLOUDSMITH_API_KEY}}
      run: pipx ensurepath && cloudsmith push raw sdlpal/sdlpal
           --version `awk -F\" '{print $2;}' generated.h` --name DOS
           --republish deploy/*.exe --tags "branch/`echo $GITHUB_REF | sed s#refs/heads/##`"
    - uses: actions/upload-artifact@v4
      with:
        name: dos-${{ github.sha }}
        path: deploy
    - uses: xresloader/upload-to-github-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        file: deploy/*
        tags: true
        draft: true

